<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | LS Eletrônicos</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<header class="topo">

<div class="container">

<a href="index.html" class="logo">

LS <span>Eletrônicos</span>

</a>

</div>

</header>

<section class="checkout">

<div class="container">

<h1>Finalizar Compra</h1>

<div class="checkoutGrid">

<div class="dadosCliente">

<h2>Dados do Cliente</h2>

<form id="formCheckout">

<div class="campo">

<label>Nome Completo</label>

<input
type="text"
id="nome"
required>

</div>

<div class="campo">

<label>E-mail</label>

<input
type="email"
id="email"
required>

</div>

<div class="campo">

<label>Telefone</label>

<input
type="tel"
id="telefone"
required>

</div>

<h2>Endereço</h2>

<div class="campo">

<label>CEP</label>

<input
type="text"
id="cep"
required>

</div>

<div class="campo">

<label>Rua</label>

<input
type="text"
id="rua"
required>

</div>

<div class="campo">

<label>Número</label>

<input
type="text"
id="numero"
required>

</div>

<div class="campo">

<label>Bairro</label>

<input
type="text"
id="bairro"
required>

</div>

<div class="campo">

<label>Cidade</label>

<input
type="text"
id="cidade"
required>

</div>

<div class="campo">

<label>Estado</label>

<input
type="text"
id="estado"
required>

</div>

</form>

</div>

<div class="resumoPedido">

<h2>Resumo do Pedido</h2>

<div id="produtosCheckout">

</div>

<hr>

<p>

Subtotal

<span id="subtotalCheckout">

R$ 0,00

</span>

</p>

<p>

Frete

<span id="freteCheckout">

R$ 0,00

</span>

</p>

<p>

Desconto

<span id="descontoCheckout">

R$ 0,00

</span>

</p>

<h3>

Total

<span id="totalCheckout">

R$ 0,00

</span>

</h3>

<div class="pagamento">

    <h2>Pagamento</h2>

    <div class="metodoPagamento">

        <label>

            <input
                type="radio"
                name="pagamento"
                value="pix"
                checked>

            PIX - Sigilo Pay

        </label>

    </div>

    <div class="pixArea">

        <div class="qrCode">

            <img
                id="qrCodePix"
                src="assets/img/qrcode-placeholder.png"
                alt="QR Code PIX">

        </div>

        <div class="pixCodigo">

            <label>PIX Copia e Cola</label>

            <textarea
                id="pixCopiaCola"
                readonly
                rows="5"
                placeholder="O código PIX será exibido aqui após gerar o pagamento.">
            </textarea>

            <button
                type="button"
                class="btnComprar"
                onclick="copiarPix()">

                Copiar Código PIX

            </button>

        </div>

    </div>

    <div class="acoesCheckout">

        <button
            type="button"
            class="btnComprar"
            onclick="gerarPix()">

            Gerar PIX

        </button>

        <button
            type="button"
            class="btnComprar"
            onclick="confirmarPagamento()">

            Confirmar Pagamento

        </button>

    </div>

</div>

</div>

</div>

</section>

<footer>

    <div class="container">

        <p style="text-align:center;padding:30px 0;">

            © 2026 LS Eletrônicos - Todos os direitos reservados.

        </p>

    </div>

</footer>

<script src="js/produtos.js"></script>

<script src="js/carrinho.js"></script>

<script src="js/checkout.js"></script>

</body>

</html>
